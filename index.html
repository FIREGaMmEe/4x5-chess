<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4×5 MiniChess</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="minichess-app" class="minichess-container">
    <header class="game-header">
      <h1>4×5 MiniChess</h1>
      <div class="status-row">
        <span id="turn-indicator">Turn: White</span>
        <span id="game-status">Status: Ready</span>
      </div>
      <button id="restart-btn" type="button">Restart Game</button>
    </header>

    <main>
      <div id="board" class="board" aria-label="MiniChess board"></div>
    </main>
  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-live="polite">
    <div class="modal-content">
      <p id="modal-message"></p>
      <button id="modal-close" type="button">OK</button>
    </div>
  </div>

  <div id="promotion-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-content">
      <p>Promote pawn to:</p>
      <div id="promotion-options" class="promotion-options"></div>
    </div>
  </div>

  <script type="module" src="ui.js"></script>
</body>
</html>
